<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Wallet</title>
</head>

<body>
  <div class="container">

    <h1 class="mt-4">Menú Principal</h1>

<div id="mensajeMenu"></div>

<div class="card p-4 mt-3">

 <div class="wallet-card">
  <p class="wallet-label">ALKE WALLET</p>
  <h2>Saldo disponible</h2>
  <p class="display-4">
    <small class="moneda">CLP</small>
  $<span id="balance">0</span>
</p>

  <p class="wallet-subtitle">Tus fondos disponibles para operar</p>
</div>

  <button id="btnDepositar" class="btn btn-primary mb-2">
    Depositar
  </button>

  <button id="btnEnviarDinero" class="btn btn-success mb-2">
    Transferir fondos
  </button>

  <button id="btnMovimientos" class="btn btn-info">
    Últimos Movimientos
  </button>

  <button id="btnCerrarSesion" class="btn btn-danger mt-2">
    Cerrar sesión
    </button>
</div>
</div>

  

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
