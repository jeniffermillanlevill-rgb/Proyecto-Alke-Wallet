<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Depósito</title>
</head>

<body>
  <div class="container">
    <h1 class="mt-4">Realizar depósito</h1>

    <div id="alert-container"></div>

<div class="card p-4 mt-3">

  <div class="wallet-card deposit-card">
    <p class="wallet-label">ALKE WALLET</p>
    <h2>Saldo disponible</h2>
    <p class="display-4">
     <small class="moneda">CLP</small>
          $<span id="saldoActual">0</span>
    </p>
    <p class="wallet-subtitle">Ingresa un monto para aumentar tus fondos</p>
  </div>

<div class="form-group mt-4">
  <label for="montoDeposito">Monto a depositar</label>
  <input
    type="number"
    id="montoDeposito"
    class="form-control"
    placeholder="Ingrese el monto"
    >
    </div>

<button id="btnRealizarDeposito" class="btn btn-primary btn-block">
  Realizar depósito
</button>
  
<p id="mensajeDeposito" class="mt-3"></p>

</div>

<a href="menu.html" class="btn btn-secondary btn-block mt-3">
  ← Volver al menú
</a>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
